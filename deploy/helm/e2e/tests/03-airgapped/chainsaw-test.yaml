# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: image-factory-airgapped
spec:
  concurrent: false
  steps:
    - name: Internal registry
      use:
        template: ../../_lib/internal-registry.step.yaml

    - name: Install image-factory
      use:
        template: ../../_lib/helm-install.step.yaml
        with:
          bindings:
            - name: registry
              value: (join('', ['registry.', $namespace, '.svc.cluster.local:5000']))
            - name: arguments
              value: >-
                (join(' ', [
                '--set=config.artifacts.core.insecure=true',
                join('=', ['--set=config.artifacts.core.registry', $registry]),
                '--set=config.artifacts.installer.external.insecure=true',
                '--set=config.artifacts.installer.external.namespace=siderolabs',
                join('=', ['--set=config.artifacts.installer.external.registry', $registry]),
                '--set=config.artifacts.installer.internal.insecure=true',
                '--set=config.artifacts.installer.internal.namespace=siderolabs',
                join('=', ['--set=config.artifacts.installer.internal.registry', $registry]),
                '--set=config.artifacts.schematic.insecure=true',
                join('=', ['--set=config.artifacts.schematic.registry', $registry]),
                '--set=config.cache.oci.insecure=true',
                join('=', ['--set=config.cache.oci.registry', $registry]),
                '--set=config.containerSignature.publicKeyFile=/etc/image-factory/cosign/cosign-pub',
                '--set=config.containerSignature.disabled=false',
                '--set-file=cacheSigningKey.key=../../testdata/signing-key.key',
                '--set=extraVolumeMounts[0].name=cosign-keys',
                '--set=extraVolumeMounts[0].mountPath=/etc/image-factory/cosign',
                '--set=extraVolumes[0].name=cosign-keys',
                '--set=extraVolumes[0].secret.secretName=image-factory-cosign-keys',
                '--set=extraObjects[0].apiVersion=v1',
                '--set=extraObjects[0].kind=Secret',
                '--set=extraObjects[0].metadata.name=image-factory-cosign-keys',
                '--set-file=extraObjects[0].stringData.cosign-pub=../../testdata/cosign.pub',
                '--set-file=extraObjects[0].stringData.cosign-key=../../testdata/cosign.key'
                ]))

    - name: Assert install
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: image-factory
              status:
                (readyReplicas == replicas): true
                (availableReplicas == replicas): true
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: image-factory
              spec:
                type: ClusterIP
                ports:
                  - port: 8080
                    targetPort: http
                    protocol: TCP
                    name: image-factory
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: image-factory-cache-signing-key
              type: Opaque
        - assert:
            resource:
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: image-factory
              automountServiceAccountToken: false
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: image-factory
        - podLogs:
            selector: app.kubernetes.io/name=image-factory
            tail: -1

    - name: Mirror Talos images
      use:
        template: ../../_lib/mirror-talos-images.step.yaml

    - name: Cosign Talos images
      use:
        template: ../../_lib/cosign-talos-images.step.yaml

    - name: Prep image-factory
      use:
        template: ../../_lib/prep-image-factory.step.yaml

    - name: Download ISO
      use:
        template: ../../_lib/download-iso.step.yaml
