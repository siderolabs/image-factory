{{- $provider := .Values.config.authentication.provider | default "" }}
{{- if and .Values.config.authentication.enabled (eq $provider "auth0") (not .Values.auth.auth0.existingSecret) }}
{{- $clientSecret := .Values.auth.auth0.clientSecret | required ".Values.auth.auth0.clientSecret is required when provider=auth0 and auth.auth0.existingSecret is empty." -}}
{{- $sessionKey := .Values.auth.auth0.sessionKey | required ".Values.auth.auth0.sessionKey is required when provider=auth0 and auth.auth0.existingSecret is empty." -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "image-factory.fullname" . }}-auth0
  namespace: {{ include "image-factory.namespace" . }}
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientSecret: {{ $clientSecret | quote }}
  sessionKey: {{ $sessionKey | quote }}
{{- end }}
