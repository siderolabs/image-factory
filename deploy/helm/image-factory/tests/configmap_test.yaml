suite: ConfigMap Logic
templates:
  - configmap.yaml

tests:
  # ========================================
  # ConfigMap Creation Tests
  # ========================================
  - it: Should create ConfigMap
    template: configmap.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-image-factory

  - it: Should include config.yaml data
    template: configmap.yaml
    asserts:
      - isNotNull:
          path: data["config.yaml"]

  - it: Should contain artifacts configuration
    template: configmap.yaml
    set:
      config:
        artifacts:
          schematic:
            registry: registry.example.com
            namespace: siderolabs/image-factory
            repository: schematics
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "registry.example.com"

  - it: Should contain cache configuration
    template: configmap.yaml
    set:
      config:
        cache:
          signingKeyPath: /etc/image-factory/keys/cache-signing.key
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "signingKeyPath"

  - it: Should include standard Helm labels
    template: configmap.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: image-factory
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]

  - it: Should be created in correct namespace
    template: configmap.yaml
    release:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  # ========================================
  # Enterprise Auth Injection Tests
  # ========================================
  - it: Should not enable authentication by default
    template: configmap.yaml
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "enabled: true"

  - it: Should inject authentication block when config.authentication.enabled
    template: configmap.yaml
    set:
      config:
        authentication:
          enabled: true
          htpasswdPath: /etc/image-factory/auth/htpasswd
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "authentication:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "enabled: true"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "htpasswdPath: /etc/image-factory/auth/htpasswd"

  - it: Should honor custom htpasswdPath in injected config
    template: configmap.yaml
    set:
      config:
        authentication:
          enabled: true
          htpasswdPath: /custom/dir/creds
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "htpasswdPath: /custom/dir/creds"

  - it: Should pass enterprise.scanner config through unchanged
    template: configmap.yaml
    set:
      config:
        enterprise:
          scanner:
            databaseURL: https://mirror.example.com/grype
            cacheTTL: 30m
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "databaseURL: https://mirror.example.com/grype"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "cacheTTL: 30m"
