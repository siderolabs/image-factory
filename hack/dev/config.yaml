audit:
  mode: log

artifacts:
  # registry mirror for ghcr.io
  core:
   registry: registry.ghcr.io:5000
   insecure: true

  # private registry repository for schematics
  schematic:
    registry: registry.local:5000
    namespace: image-factory
    repository: schematic
    insecure: true

  installer:
    # internal registry namespace to push installer images to
    internal:
      registry: registry.local:5000
      namespace: siderolabs
      insecure: true

cache:
  oci:
    # private registry repository for cached assets
    registry: registry.local:5000
    namespace: image-factory
    repository: cache
    insecure: true

  # path to the ECDSA private key (to sign cached assets)
  signingKeyPath: /etc/image-factory/cache-signing-key.key

http:
  # external URL the Image Factory is available at
  externalURL: http://localhost:8080

authentication:
  enabled: true
  provider: auth0
  auth0:
    domain: image-factory-enterprise-dev.us.auth0.com
    audience: https://image-factory-enterprise-dev
    # Browser login fields (omit all four to run M2M-only):
    clientID: obVSOQGWFFyEW9seAt95F5bjhwmQa8gJ
    # clientSecret injected via IF_AUTHENTICATION_AUTH0_CLIENTSECRET env var
    redirectURL: http://localhost:8080/callback
    # sessionKey injected via IF_AUTHENTICATION_AUTH0_SESSIONKEY env var

enterprise:
  # extraExtensions:
  #   manifest:
  #     registry: registry.local:5000
  #     namespace: extension-testing
  #     repository: extensions
  #     insecure: true
  spdx:
    cache:
      # private registry repository for cached spdx
      registry: registry.local:5000
      namespace: image-factory
      repository: spdx-cache
      insecure: true
  vex:
    data:
      registry: registry.ghcr.io:5000
      namespace: siderolabs/image-factory
      repository: test-vex-data
      insecure: true
    cacheTTL: 15s
