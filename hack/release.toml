# commit to be tagged for the new release
commit = "HEAD"

project_name = "image-factory"
github_repo = "siderolabs/image-factory"
match_deps = "^github.com/(siderolabs/[a-zA-Z0-9-]+)$"

previous = "v1.3.1"
pre_release = false

[notes]

    [notes.scanner]
        title = "Machine configuration embedding"
        description = """\
Image Factory now supports embedding machine configuration into generated images starting with Talos version 1.2.0 onwards.
"""

[make_deps]

    [make_deps.pkgs]
        variable = "PKGS"
        repository = "github.com/siderolabs/pkgs"
