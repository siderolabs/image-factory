# commit to be tagged for the new release
commit = "HEAD"

project_name = "image-factory"
github_repo = "siderolabs/image-factory"
match_deps = "^github.com/(siderolabs/[a-zA-Z0-9-]+)$"

previous = "v1.0.2"
pre_release = false

[notes]

    [notes.sbom]
        title = "SPDX SBOM viewer"
        description = """\
Added a new SPDX SBOM section to the Enterprise Image Factory.
Users can now request SBOMs for a specific Talos schematic directly from the Image Factory interface.

**Note:** This feature is enterprise-only and is subject to the BUSL-1.1 license.
"""

[make_deps]

    [make_deps.pkgs]
        variable = "PKGS"
        repository = "github.com/siderolabs/pkgs"
